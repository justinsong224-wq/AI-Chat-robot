<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI Chat Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    overflow: hidden;
}

/* ═══════════════════════════════════════════════════════
   ─── 新增：左侧侧边栏 ───
   固定宽度 240px，深色背景，像 ChatGPT 侧边栏
   ═══════════════════════════════════════════════════════ */
#sidebar {
    width: 240px;
    min-width: 240px;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 8px;
    overflow-y: auto;
}

#sidebar h3 {
    font-size: 13px;
    color: #6c7086;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
}

/* ─── 新增：新建会话按钮 ─── */
#newSessionBtn {
    background: #313244;
    color: #cdd6f4;
    border: 1px solid #45475a;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
}
#newSessionBtn:hover { background: #45475a; }

/* ─── 新增：会话列表 ─── */
#session-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
}

/* ─── 新增：单个会话条目 ─── */
.session-item {
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #cdd6f4;
    transition: background 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis; /* 标题太长时显示省略号 */
}
.session-item:hover    { background: #313244; }

/* ─── 新增：选中状态，蓝色高亮 ─── */
.session-item.active   { background: #45475a; color: #89b4fa; }


/* ── 右侧主区域 ── */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    overflow: hidden;
}

h2 {
    margin-bottom: 16px;
    font-size: 22px;
    color: #333;
    letter-spacing: 1px;
}

#chat-container {
    width: 700px;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    overflow: hidden;
}

#chat-box {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fff;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* ─── 新增：未选中会话时的空状态提示 ─── */
#empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    gap: 12px;
    font-size: 15px;
}
#empty-state .icon { font-size: 48px; }

.message {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    line-height: 1.6;
    font-size: 15px;
    word-break: break-word;
}
.user {
    background: #d1fae5;
    margin-left: auto;
    text-align: right;
    border-bottom-right-radius: 3px;
}
.ai {
    background: #f1f5f9;
    margin-right: auto;
    text-align: left;
    border-bottom-left-radius: 3px;
}
.ai b, .user b {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: #666;
}

#input-area {
    display: flex;
    align-items: center;
    border: 1.5px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    transition: border-color 0.2s;
}
#input-area:focus-within { border-color: #4f86f7; }

#message-input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px 14px;
    font-size: 15px;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    background: transparent;
    min-height: 46px;
    max-height: 120px;
    overflow-y: auto;
}

.btn {
    border: none;
    outline: none;
    cursor: pointer;
    padding: 0 16px;
    height: 46px;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
}
#sendBtn {
    background: #4f86f7;
    color: #fff;
    border-radius: 0 8px 8px 0;
    font-weight: bold;
    min-width: 70px;
}
#sendBtn:hover    { background: #3a6fd8; }
#sendBtn:disabled { background: #a0b4d6; cursor: not-allowed; }

/* ─── 新增：清空按钮，只删当前选中会话 ─── */
#clearBtn {
    background: #f1f1f1;
    color: #555;
    border-right: 1px solid #e0e0e0;
    min-width: 70px;
}
#clearBtn:hover { background: #ffe0e0; color: #c00; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
}
.typing-cursor::after {
    content: "▋";
    animation: blink 0.8s infinite;
    color: #4f86f7;
    font-size: 14px;
    margin-left: 2px;
}

.ai span code {
    background: #eef2ff;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 13px;
    font-family: monospace;
}
.ai span pre {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 13px;
}

/* ─── 新增：命名弹窗遮罩 ─── */
#modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
#modal-overlay.show { display: flex; }

#modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
#modal h3 { font-size: 16px; color: #333; }
#modal-input {
    border: 1.5px solid #ccc;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
}
#modal-input:focus { border-color: #4f86f7; }
#modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}
.modal-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
}
#modal-cancel { background: #f1f1f1; color: #555; }
#modal-confirm { background: #4f86f7; color: #fff; font-weight: bold; }
#modal-confirm:hover { background: #3a6fd8; }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     ─── 新增：左侧侧边栏 HTML 结构 ───
     ═══════════════════════════════════════════════════════ -->
<div id="sidebar">
    <h3>💬 会话列表</h3>
    <button id="newSessionBtn" onclick="openNewSessionModal()">
        ＋ 新建会话
    </button>
    <div id="session-list">
        <!-- 会话条目由 JS 动态生成 -->
    </div>
</div>

<!-- 右侧主聊天区 -->
<div id="main">
    <h2>🤖 AI Chat Assistant</h2>

    <!-- 未选中会话时显示引导提示 -->
    <div id="empty-state">
        <div class="icon">💬</div>
        <div>从左侧选择一个会话，或新建会话开始聊天</div>
    </div>

    <!-- 聊天主体（选中会话后显示） -->
    <div id="chat-container" style="display:none;">
        <div id="chat-box"></div>
        <div id="input-area">
            <button class="btn" id="clearBtn" onclick="deleteCurrentSession()">删除</button>
            <textarea id="message-input"
                      placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"
                      rows="1"></textarea>
            <button class="btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<!-- ─── 新增：新建会话命名弹窗 ─── -->
<div id="modal-overlay">
    <div id="modal">
        <h3>新建会话</h3>
        <input id="modal-input" placeholder="输入会话名称..." maxlength="30" />
        <div id="modal-actions">
            <button class="modal-btn" id="modal-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn" id="modal-confirm" onclick="confirmNewSession()">创建</button>
        </div>
    </div>
</div>

<script>

const BACKEND = "https://web-production-01606.up.railway.app";

// ─── 新增：当前选中的会话 id（null = 未选中任何会话）───
let currentSessionId = null;
let messages         = [];
let isThinking       = false;

const chatBox     = document.getElementById("chat-box");
const input       = document.getElementById("message-input");
const sendBtn     = document.getElementById("sendBtn");
const sessionList = document.getElementById("session-list");


// textarea 自动伸缩
input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

// Enter 发送 / Shift+Enter 换行
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});


// ── 追加气泡 ──
function addMessage(sender, text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = "<b>" + sender + "</b>" + text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
}


// ═══════════════════════════════════════════════════════
// ─── 新增：弹窗控制 ───
// 用户点"新建会话"时弹出命名输入框，
// 确认后调用后端 POST /sessions 创建会话
// ═══════════════════════════════════════════════════════
function openNewSessionModal() {
    document.getElementById("modal-input").value = "";
    document.getElementById("modal-overlay").classList.add("show");
    setTimeout(() => document.getElementById("modal-input").focus(), 50);
}

function closeModal() {
    document.getElementById("modal-overlay").classList.remove("show");
}

// 弹窗内也支持 Enter 确认
document.getElementById("modal-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") confirmNewSession();
    if (e.key === "Escape") closeModal();
});

async function confirmNewSession() {
    const title = document.getElementById("modal-input").value.trim();
    if (!title) {
        document.getElementById("modal-input").focus();
        return;
    }
    closeModal();

    // 调用后端创建会话
    const res  = await fetch(`${BACKEND}/sessions`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title })
    });
    const data = await res.json();

    // 把新会话加到侧边栏并自动选中
    addSessionToSidebar(data.id, data.title);
    switchSession(data.id, data.title);
}


// ═══════════════════════════════════════════════════════
// ─── 新增：在侧边栏渲染一个会话条目 ───
// ═══════════════════════════════════════════════════════
function addSessionToSidebar(id, title, prepend = true) {
    const item = document.createElement("div");
    item.className   = "session-item";
    item.dataset.id  = id;
    item.textContent = title;
    item.onclick     = () => switchSession(id, title);

    // prepend=true：新会话插到最上面（最新的在顶部）
    if (prepend) {
        sessionList.prepend(item);
    } else {
        sessionList.appendChild(item);
    }
}


// ═══════════════════════════════════════════════════════
// ─── 新增：切换会话 ───
// 点击侧边栏某个会话时：
//   1. 更新高亮状态
//   2. 显示聊天主体区域
//   3. 从后端加载该会话的历史消息
// ═══════════════════════════════════════════════════════
async function switchSession(id, title) {
    // 更新选中高亮
    document.querySelectorAll(".session-item").forEach(el => {
        el.classList.toggle("active", parseInt(el.dataset.id) === id);
    });

    currentSessionId = id;
    messages = [];

    // 显示聊天区，隐藏空状态提示
    document.getElementById("empty-state").style.display  = "none";
    document.getElementById("chat-container").style.display = "flex";

    // 清空聊天框，准备加载新会话消息
    chatBox.innerHTML = "";

    // 从后端加载该会话历史
    try {
        const res  = await fetch(`${BACKEND}/sessions/${id}/messages`);
        const data = await res.json();
        messages   = data.messages;
        messages.forEach(msg => {
            const isUser = msg.role === "user";
            addMessage(isUser ? "你" : "AI", msg.content, isUser ? "user" : "ai");
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    } catch (e) {
        console.warn("加载会话消息失败：", e);
    }

    input.focus();
}


// ═══════════════════════════════════════════════════════
// ─── 新增：删除当前选中的会话 ───
// 点侧边栏"删除"按钮时调用，先弹确认框，
// 确认后调用后端 DELETE /sessions/{id}，
// 后端设置了 ON DELETE CASCADE，消息自动一并删除
// ═══════════════════════════════════════════════════════
async function deleteCurrentSession() {
    if (!currentSessionId) return;

    // 找到当前会话的标题用于确认提示
    const activeItem = document.querySelector(".session-item.active");
    const title = activeItem ? activeItem.textContent : "该会话";

    if (!confirm(`确认删除「${title}」及其所有聊天记录？此操作不可撤销。`)) return;

    try {
        await fetch(`${BACKEND}/sessions/${currentSessionId}`, { method: "DELETE" });
    } catch (e) {
        console.warn("删除会话失败：", e);
    }

    // 从侧边栏移除该条目
    if (activeItem) activeItem.remove();

    // 重置状态，显示空状态提示
    currentSessionId = null;
    messages = [];
    chatBox.innerHTML = "";
    document.getElementById("chat-container").style.display = "none";
    document.getElementById("empty-state").style.display    = "flex";
}


// ── 发送消息（流式 SSE，新增 session_id）──
async function sendMessage() {
    if (!currentSessionId) {
        alert("请先从左侧选择或新建一个会话！");
        return;
    }
    if (isThinking) {
        alert("AI 正在回答，请稍等...");
        return;
    }

    const message = input.value.trim();
    if (!message) return;

    addMessage("你", message, "user");
    messages.push({ role: "user", content: message });

    input.value = "";
    input.style.height = "auto";
    input.disabled = true;
    sendBtn.disabled = true;
    isThinking = true;

    const aiDiv = document.createElement("div");
    aiDiv.className = "message ai";
    aiDiv.innerHTML = "<b>AI</b>";
    const aiBubble = document.createElement("span");
    aiBubble.textContent = "正在思考... ⏳";
    aiDiv.appendChild(aiBubble);
    chatBox.appendChild(aiDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    let fullResponse = "";

    try {
        const res = await fetch(`${BACKEND}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // ─── 新增：传入 session_id ───
            body: JSON.stringify({ session_id: currentSessionId, messages })
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith("data: ")) continue;
                const raw = line.slice(6).trim();

                if (raw === "[DONE]") {
                    aiBubble.classList.remove("typing-cursor");
                    aiBubble.innerHTML = marked.parse(fullResponse);

                    messages.push({ role: "assistant", content: fullResponse });

                    // 保存 AI 回答到对应会话
                    await saveToBackend(currentSessionId, "assistant", fullResponse);
                    continue;
                }

                try {
                    const piece = JSON.parse(raw).text || "";
                    if (piece) {
                        if (!fullResponse) {
                            aiBubble.textContent = "";
                            aiBubble.classList.add("typing-cursor");
                        }
                        fullResponse += piece;
                        aiBubble.textContent = fullResponse;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                } catch (e) { /* 忽略 */ }
            }
        }

    } catch (error) {
        aiBubble.classList.remove("typing-cursor");
        aiBubble.textContent = "⚠️ 连接失败，请确认后端服务已启动（uvicorn main:app --reload）";
    } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        isThinking = false;
    }
}


// 保存 AI 回答到后端（新增 session_id）
async function saveToBackend(sessionId, role, content) {
    try {
        await fetch(`${BACKEND}/save`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, role, content })
        });
    } catch (e) {
        console.warn("保存到后端失败：", e);
    }
}


// ═══════════════════════════════════════════════════════
// ─── 修改：页面加载时从后端获取所有会话列表 ───
// 不再加载单个历史，而是把所有会话渲染到侧边栏，
// 用户自己点击选择要查看哪个会话
// ═══════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const res  = await fetch(`${BACKEND}/sessions`);
        const data = await res.json();
        // 后端已按 id DESC 排序（最新的在前），直接追加即可
        data.sessions.forEach(s => addSessionToSidebar(s.id, s.title, false));
    } catch (e) {
        console.warn("加载会话列表失败，后端可能未启动：", e);
    }
});

</script>
</body>
</html>
